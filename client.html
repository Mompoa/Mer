<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nebulous · Blob Wars</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon: #00ffe7;
    --neon2: #ff00aa;
    --neon3: #ffe000;
    --bg: #04070f;
    --panel: rgba(0,20,40,0.92);
    --border: rgba(0,255,231,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
    color: #fff;
    touch-action: none;
  }

  /* ===== CANVAS ===== */
  #gameCanvas {
    position: fixed;
    inset: 0;
    display: block;
    cursor: none;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at 50% 30%, #001a35 0%, #04070f 70%);
  }

  .screen.hidden { display: none; }

  /* --- Title Screen --- */
  #titleScreen .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 10vw, 5.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--neon) 0%, var(--neon2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,231,0.5));
    animation: pulseGlow 2.5s ease-in-out infinite;
    text-align: center;
  }

  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,231,0.4)); }
    50% { filter: drop-shadow(0 0 50px rgba(0,255,231,0.9)); }
  }

  #titleScreen .subtitle {
    font-size: clamp(0.8rem, 3vw, 1rem);
    color: rgba(0,255,231,0.5);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 0.4rem;
    margin-bottom: 3rem;
  }

  .input-wrap {
    position: relative;
    width: min(360px, 88vw);
    margin-bottom: 1.5rem;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1.1rem;
    color: #fff;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .input-wrap input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(0,255,231,0.2);
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-play {
    width: min(360px, 88vw);
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--neon) 0%, #00b8a9 100%);
    border: none;
    border-radius: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #04070f;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s;
    box-shadow: 0 0 30px rgba(0,255,231,0.35);
    -webkit-tap-highlight-color: transparent;
  }

  .btn-play:active { transform: scale(0.97); }
  .btn-play:hover { box-shadow: 0 0 50px rgba(0,255,231,0.6); }

  /* ===== ROOM LIST SCREEN ===== */
  #roomListScreen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    z-index: 100;
    background: #04080f;
  }
  #roomListScreen.hidden { display: none; }

  #roomListHeader {
    background: rgba(0,20,50,0.98);
    border-bottom: 1.5px solid rgba(0,255,231,0.15);
    padding: 10px 14px 0;
    flex-shrink: 0;
  }
  #roomListTitle {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 900;
    color: var(--neon);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 8px;
  }
  .rl-tabs {
    display: flex; gap: 4px; margin-bottom: 0;
  }
  .rl-tab {
    flex: 1; padding: 8px 4px;
    background: rgba(0,255,231,0.04);
    border: 1.5px solid rgba(0,255,231,0.1);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem; font-weight: 700;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .rl-tab.active {
    background: rgba(0,255,231,0.12);
    border-color: var(--neon);
    color: var(--neon);
  }

  #roomList {
    flex: 1; overflow-y: auto;
    padding: 0;
    -webkit-overflow-scrolling: touch;
  }
  #roomList::-webkit-scrollbar { width: 3px; }
  #roomList::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.15); }

  .room-entry {
    display: flex; align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,255,231,0.07);
    gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .room-entry:active { background: rgba(0,255,231,0.06); }
  .room-entry-info { flex: 1; min-width: 0; }
  .room-entry-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem; font-weight: 700;
    color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .room-entry-mode {
    font-size: 0.68rem;
    color: var(--neon3);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .room-entry-host {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.35);
    margin-top: 1px;
  }
  .room-entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .room-entry-players {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem; font-weight: 700;
    color: var(--neon);
  }
  .room-entry-players.full { color: #ff4466; }
  .room-entry-join {
    background: linear-gradient(135deg, var(--neon), #00b8a9);
    border: none; border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.5rem; font-weight: 700;
    color: #04070f; padding: 4px 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .room-entry-join.full-btn {
    background: rgba(255,68,102,0.2);
    color: #ff4466;
    border: 1px solid rgba(255,68,102,0.3);
    cursor: default;
  }
  .room-empty-msg {
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 0.8rem;
    padding: 40px 20px;
    font-style: italic;
  }

  #roomListFooter {
    display: flex; gap: 8px;
    padding: 10px 14px;
    background: rgba(0,15,35,0.98);
    border-top: 1.5px solid rgba(0,255,231,0.12);
    flex-shrink: 0;
  }
  .rl-foot-btn {
    flex: 1; padding: 12px 8px;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer; border: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .rl-foot-btn:active { transform: scale(0.96); }
  #rlBtnCreate {
    background: linear-gradient(135deg, var(--neon2), #aa0077);
    color: #fff;
  }
  #rlBtnRefresh {
    background: rgba(0,255,231,0.1);
    border: 1.5px solid rgba(0,255,231,0.2) !important;
    color: var(--neon);
    flex: 0 0 52px;
    font-size: 1rem;
  }
  #rlBtnBack {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12) !important;
    color: rgba(255,255,255,0.6);
    flex: 0 0 52px;
    font-size: 1rem;
  }

  /* ===== CREATE ROOM MODAL ===== */
  #createRoomModal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex; align-items: flex-end;
    justify-content: center;
  }
  #createRoomModal.hidden { display: none; }
  #createRoomBox {
    background: #061020;
    border: 1.5px solid rgba(0,255,231,0.2);
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 30px;
    width: 100%; max-width: 480px;
  }
  #createRoomBox h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem; font-weight: 900;
    color: var(--neon); letter-spacing: 0.15em;
    text-align: center; margin-bottom: 16px;
  }
  .cr-field { margin-bottom: 14px; }
  .cr-label {
    font-size: 0.68rem; font-weight: 600;
    color: rgba(0,255,231,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block; margin-bottom: 6px;
  }
  .cr-input {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid rgba(0,255,231,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem; color: #fff; outline: none;
  }
  .cr-input:focus { border-color: var(--neon); }
  .cr-select {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid rgba(0,255,231,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem; color: #fff; outline: none;
    appearance: none;
  }
  .cr-select option { background: #061020; color: #fff; }
  .cr-btns { display: flex; gap: 10px; margin-top: 18px; }
  .cr-btn {
    flex: 1; padding: 12px;
    border-radius: 10px; border: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .cr-btn:active { transform: scale(0.96); }
  #crBtnConfirm {
    background: linear-gradient(135deg, var(--neon2), #aa0077);
    color: #fff;
  }
  #crBtnCancel {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1) !important;
  }

  /* ===== ROOM BADGE IN-GAME ===== */
  #roomBadge {
    position: fixed;
    top: 54px; left: 50%; transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    color: rgba(0,255,231,0.6);
    padding: 4px 14px;
    z-index: 50;
    letter-spacing: 0.12em;
    display: none;
    pointer-events: none;
  }

  .orbs-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: -1;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px, -60px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.9); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* --- Dead Screen --- */
  #deadScreen {
    background: rgba(4,7,15,0.92);
    backdrop-filter: blur(6px);
  }

  #deadScreen h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: var(--neon2);
    filter: drop-shadow(0 0 20px rgba(255,0,170,0.6));
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 60%{transform:translateX(12px)} 80%{transform:translateX(-6px)}
  }

  #deadScreen .score-big {
    font-size: clamp(1.2rem, 5vw, 2rem);
    color: var(--neon3);
    margin: 0.8rem 0 2.5rem;
    font-weight: 600;
  }

  /* ===== HUD ===== */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 50;
  }

  #hud.hidden { display: none; }

  .hud-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 3.5vw, 1.3rem);
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 12px rgba(0,255,231,0.7);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 30px;
    min-width: 80px;
    text-align: center;
  }

  /* Leaderboard */
  #leaderboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    min-width: 150px;
    backdrop-filter: blur(6px);
  }

  #leaderboard h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }

  .lb-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.85);
    padding: 2px 0;
  }

  .lb-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .lb-me { color: var(--neon3); font-weight: 700; }
  .lb-rank { opacity: 0.5; font-size: 0.65rem; min-width: 14px; }

  /* ===== TOUCH JOYSTICK ===== */
  #joystickWrap {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 60;
    pointer-events: none;
  }

  #joystickWrap.hidden { display: none; }

  #joyBase {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(0,255,231,0.06);
    border: 2px solid rgba(0,255,231,0.2);
    position: relative;
    pointer-events: all;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  #joyKnob {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(0,255,231,0.9), rgba(0,180,170,0.6));
    border: 2px solid var(--neon);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    box-shadow: 0 0 18px rgba(0,255,231,0.5);
    pointer-events: none;
  }

  /* ===== ACTION BUTTONS ===== */
  #actionBtns {
    position: fixed;
    bottom: 24px; right: 20px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  #actionBtns.hidden { display: none; }

  .act-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 3px;
    transition: transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }

  .act-btn:active { transform: scale(0.9); }

  .act-btn .icon { font-size: 1.3rem; }

  #btnSplit {
    background: radial-gradient(circle at 35% 35%, rgba(255,0,170,0.8), rgba(180,0,120,0.5));
    border-color: var(--neon2);
    box-shadow: 0 0 20px rgba(255,0,170,0.4);
  }

  #btnEject {
    background: radial-gradient(circle at 35% 35%, rgba(255,224,0,0.7), rgba(180,140,0,0.4));
    border-color: var(--neon3);
    box-shadow: 0 0 20px rgba(255,224,0,0.3);
  }

  /* ===== CONNECTING INDICATOR ===== */
  #connecting {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,7,15,0.8);
    z-index: 200;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    color: var(--neon);
    letter-spacing: 0.15em;
  }

  #connecting.hidden { display: none; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(0,255,231,0.15);
    border-top-color: var(--neon);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }



  /* ===== PING ===== */
  #pingLabel {
    position: fixed; bottom: 8px; right: 8px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    z-index: 50;
    font-family: 'Exo 2', sans-serif;
  }

  /* ===== COLOR PICKER ===== */
  #colorPickerWrap {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .color-pick-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.4);
  }
  #colorSwatches {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 280px;
  }
  .color-swatch {
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .color-swatch:active { transform: scale(0.9); }
  .color-swatch.selected {
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  /* ===== KILL FEED ===== */
  #killFeed {
    position: fixed; top: 60px; right: 10px;
    z-index: 55;
    display: flex; flex-direction: column; gap: 5px;
    align-items: flex-end;
    pointer-events: none;
  }
  .kf-entry {
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 4px 10px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.72rem;
    display: flex; align-items: center; gap: 5px;
    animation: kfIn 0.2s ease;
    transition: opacity 0.4s;
  }
  .kf-entry.fading { opacity: 0; }
  @keyframes kfIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .kf-name { font-weight: 700; }
  .kf-icon { font-size: 0.85rem; }

  /* ===== CHAT BUTTON ===== */
  #chatToggleBtn {
    position: fixed;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 60;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 18px;
    cursor: pointer;
    display: none;
    align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow 0.2s;
  }
  #chatToggleBtn:active { box-shadow: 0 0 16px rgba(0,255,231,0.4); }
  #chatUnread {
    background: var(--neon2);
    color: #fff;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 0.55rem;
    display: none;
    align-items: center; justify-content: center;
    font-family: 'Exo 2', sans-serif;
  }

  /* ===== CHAT PANEL ===== */
  #chatPanel {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 55vh;
    max-height: 420px;
    background: rgba(3, 12, 28, 0.96);
    border-bottom: 1.5px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 80;
    display: none;
    flex-direction: column;
    transform: translateY(-100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  }
  #chatPanel.open {
    transform: translateY(0);
  }

  /* Chat header */
  #chatHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 0;
    flex-shrink: 0;
  }
  #chatTitle {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 0.15em;
  }
  #chatCloseBtn {
    background: rgba(255,0,100,0.2);
    border: 1.5px solid rgba(255,0,100,0.4);
    border-radius: 8px;
    color: #ff4466;
    font-size: 1rem;
    width: 30px; height: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  /* Tabs */
  #chatTabs {
    display: flex;
    gap: 4px;
    padding: 8px 14px 0;
    flex-shrink: 0;
  }
  .chat-tab {
    flex: 1;
    padding: 6px 0;
    background: rgba(0,255,231,0.05);
    border: 1px solid rgba(0,255,231,0.12);
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chat-tab.active {
    background: rgba(0,255,231,0.15);
    border-color: var(--neon);
    color: var(--neon);
  }

  /* Messages */
  #chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
  }
  #chatMessages::-webkit-scrollbar { width: 3px; }
  #chatMessages::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.2); border-radius: 2px; }

  .chat-msg {
    display: flex;
    gap: 6px;
    align-items: baseline;
    font-size: 0.78rem;
    line-height: 1.4;
    animation: fadeInMsg 0.2s ease;
  }
  @keyframes fadeInMsg { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .chat-msg-sender {
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.72rem;
  }
  .chat-msg-time {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }
  .chat-msg-text { color: rgba(255,255,255,0.85); word-break: break-word; }
  .chat-msg.server .chat-msg-text { font-style: italic; }

  /* Input row */
  #chatInputRow {
    display: flex;
    gap: 8px;
    padding: 8px 14px 12px;
    flex-shrink: 0;
    border-top: 1px solid rgba(0,255,231,0.08);
  }
  #chatInput {
    flex: 1;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    color: #fff;
    outline: none;
  }
  #chatInput:focus { border-color: var(--neon); }
  #chatSendBtn {
    background: linear-gradient(135deg, var(--neon), #00b8a9);
    border: none;
    border-radius: 10px;
    color: #04070f;
    font-size: 1.1rem;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- ===== CONNECTING ===== -->
<div id="connecting">
  <div class="spinner"></div>
  CONNECTING…
</div>

<!-- ===== TITLE SCREEN ===== -->
<div id="titleScreen" class="screen hidden">
  <div class="orbs-bg" id="orbsBg"></div>
  <div class="logo">NEBULOUS</div>
  <div class="subtitle">Blob · Wars · Reborn</div>
  <div class="input-wrap">
    <input id="nameInput" type="text" placeholder="Enter your name…" maxlength="16" autocomplete="off" spellcheck="false">
  </div>
  <div id="colorPickerWrap">
    <div class="color-pick-label">PICK YOUR COLOR</div>
    <div id="colorSwatches"></div>
  </div>
  <button class="btn-play" id="btnPlay" style="margin-bottom:12px">▶ PLAY PUBLIC</button>
  <button class="btn-play" id="btnGoRooms" style="background:linear-gradient(135deg,var(--neon2),#aa0077);box-shadow:0 0 30px rgba(255,0,170,0.35)">🏠 CUSTOM ROOMS</button>
</div>

<!-- ===== ROOM LIST SCREEN ===== -->
<div id="roomListScreen" class="hidden">
  <div id="roomListHeader">
    <div id="roomListTitle">🏠 CUSTOM ROOMS</div>
    <div class="rl-tabs">
      <button class="rl-tab active" data-rltab="all">ALL ROOMS</button>
      <button class="rl-tab" data-rltab="open">OPEN</button>
    </div>
  </div>
  <div id="roomList"><div class="room-empty-msg">Loading rooms…</div></div>
  <div id="roomListFooter">
    <button class="rl-foot-btn" id="rlBtnBack">←</button>
    <button class="rl-foot-btn" id="rlBtnCreate">＋ CREATE ROOM</button>
    <button class="rl-foot-btn" id="rlBtnRefresh">↻</button>
  </div>
</div>

<!-- ===== CREATE ROOM MODAL ===== -->
<div id="createRoomModal" class="hidden">
  <div id="createRoomBox">
    <h3>🏠 CREATE ROOM</h3>
    <div class="cr-field">
      <label class="cr-label">Room Name</label>
      <input class="cr-input" id="crName" type="text" placeholder="e.g. FFA HUGE" maxlength="24" autocomplete="off">
    </div>
    <div class="cr-field">
      <label class="cr-label">Max Players</label>
      <select class="cr-select" id="crMaxPlayers">
        <option value="4">4 Players</option>
        <option value="8">8 Players</option>
        <option value="14">14 Players</option>
        <option value="16">16 Players</option>
        <option value="20">20 Players</option>
        <option value="30" selected>30 Players</option>
      </select>
    </div>
    <div class="cr-field">
      <label class="cr-label">Game Mode</label>
      <select class="cr-select" id="crMode">
        <option value="ffa">FFA — Merge after 10 seconds</option>
        <option value="ffa-fast">FFA Fast — Merge quickly</option>
      </select>
    </div>
    <div class="cr-btns">
      <button class="cr-btn" id="crBtnCancel">CANCEL</button>
      <button class="cr-btn" id="crBtnConfirm">CREATE ＆ JOIN</button>
    </div>
  </div>
</div>

<!-- ===== ROOM BADGE ===== -->
<div id="roomBadge"></div>

<!-- ===== DEAD SCREEN ===== -->
<div id="deadScreen" class="screen hidden">
  <h2>YOU DIED</h2>
  <div class="score-big" id="finalScore">Score: 0</div>
  <button class="btn-play" id="btnRespawn">RESPAWN</button>
</div>

<!-- ===== CHAT TOGGLE BUTTON ===== -->
<button id="chatToggleBtn">💬 CHAT <span id="chatUnread"></span></button>

<!-- ===== CHAT PANEL ===== -->
<div id="chatPanel">
  <div id="chatHeader">
    <span id="chatTitle">💬 CHAT</span>
    <button id="chatCloseBtn">✕</button>
  </div>
  <div id="chatTabs">
    <button class="chat-tab active" data-tab="all">ALL</button>
    <button class="chat-tab" data-tab="game">GAME</button>
  </div>
  <div id="chatMessages"></div>
  <div id="chatInputRow">
    <input id="chatInput" type="text" placeholder="Say something…" maxlength="120" autocomplete="off">
    <button id="chatSendBtn">➤</button>
  </div>
</div>

<!-- ===== KILL FEED ===== -->
<div id="killFeed"></div>

<!-- ===== GAME CANVAS ===== -->
<canvas id="gameCanvas"></canvas>

<!-- ===== HUD ===== -->
<div id="hud" class="hidden">
  <div class="hud-score" id="scoreLabel">0</div>
  <div id="leaderboard">
    <h3>⚡ Top Players</h3>
    <div id="lbEntries"></div>
  </div>
</div>



<!-- ===== JOYSTICK ===== -->
<div id="joystickWrap" class="hidden">
  <div id="joyBase">
    <div id="joyKnob"></div>
  </div>
</div>

<!-- ===== ACTION BUTTONS ===== -->
<div id="actionBtns" class="hidden">
  <button class="act-btn" id="btnSplit">
    <span class="icon">💥</span>SPLIT
  </button>
  <button class="act-btn" id="btnEject">
    <span class="icon">🔵</span>EJECT
  </button>
</div>

<!-- ===== PING ===== -->
<div id="pingLabel">-- ms</div>

<script>
(() => {
  // ===== DOM =====
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const titleScreen = document.getElementById("titleScreen");
  const deadScreen = document.getElementById("deadScreen");
  const connectingEl = document.getElementById("connecting");
  const hud = document.getElementById("hud");
  const joystickWrap = document.getElementById("joystickWrap");
  const actionBtns = document.getElementById("actionBtns");
  const scoreLabel = document.getElementById("scoreLabel");
  const lbEntries = document.getElementById("lbEntries");
  const finalScore = document.getElementById("finalScore");
  const nameInput = document.getElementById("nameInput");
  const joyBase = document.getElementById("joyBase");
  const joyKnob = document.getElementById("joyKnob");
  const pingLabel = document.getElementById("pingLabel");

  // ===== STATE =====
  let ws = null;
  let myId = null;
  let mapWidth = 4000, mapHeight = 4000;
  let gameState = { players: [], food: [], viruses: [], leaderboard: [] };
  let camX = 0, camY = 0, camZoom = 1;
  let targetCamX = 0, targetCamY = 0, targetZoom = 1;
  let mouseX = 0, mouseY = 0;
  let worldMouseX = 0, worldMouseY = 0;
  let playing = false;
  let pingStart = 0, pingMs = 0;

  // Joystick state
  let joyActive = false, joyTouchId = null;
  let joyBaseX = 0, joyBaseY = 0;
  let joyDx = 0, joyDy = 0;
  const JOY_RADIUS = 60;
  // Persistent direction — keeps last joystick angle even when released
  let lastDirAngle = -Math.PI / 2; // default: up

  // ===== COLOR PICKER =====
  const SWATCH_COLORS = [
    "#00ffe7","#ff4466","#ffcc00","#00aaff","#ff6600",
    "#cc00ff","#00ff66","#ff0088","#ffffff","#ff3300",
    "#44ffcc","#ffaa00","#0066ff","#ff00cc","#66ff00",
  ];
  let selectedColor = SWATCH_COLORS[0];
  const colorSwatchesEl = document.getElementById("colorSwatches");
  SWATCH_COLORS.forEach((c, i) => {
    const sw = document.createElement("div");
    sw.className = "color-swatch" + (i === 0 ? " selected" : "");
    sw.style.background = c;
    sw.addEventListener("click", () => selectColor(c, sw));
    sw.addEventListener("touchstart", (e) => { e.preventDefault(); selectColor(c, sw); }, { passive: false });
    colorSwatchesEl.appendChild(sw);
  });
  function selectColor(c, el) {
    selectedColor = c;
    colorSwatchesEl.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
    el.classList.add("selected");
  }

  // ===== KILL FEED =====
  const killFeedEl = document.getElementById("killFeed");
  function addKillFeed(killerName, killerColor, victimName, victimColor) {
    const entry = document.createElement("div");
    entry.className = "kf-entry";
    entry.innerHTML = `<span class="kf-name" style="color:${killerColor}">${escHtml(killerName)}</span><span class="kf-icon">🍽️</span><span class="kf-name" style="color:${victimColor}">${escHtml(victimName)}</span>`;
    killFeedEl.appendChild(entry);
    // Remove old entries beyond 5
    while (killFeedEl.children.length > 5) killFeedEl.removeChild(killFeedEl.firstChild);
    // Fade out after 4s
    setTimeout(() => { entry.classList.add("fading"); setTimeout(() => entry.remove(), 400); }, 4000);
  }

  // Animated orbs on title
  const orbsEl = document.getElementById("orbsBg");
  for (let i = 0; i < 5; i++) {
    const o = document.createElement("div");
    o.className = "orb";
    const size = 200 + Math.random() * 300;
    o.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%; top:${Math.random() * 100}%;
      background:${["#00ffe7","#ff00aa","#ffe000","#00aaff","#7700ff"][i]};
      animation-duration:${8 + Math.random() * 10}s;
      animation-delay:-${Math.random() * 10}s;
    `;
    orbsEl.appendChild(o);
  }

  // ===== RESIZE =====
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  // ===== WebSocket =====
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const url = `${proto}://${location.host}`;
    ws = new WebSocket(url);
    ws.onopen = () => {
      connectingEl.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    };
    ws.onmessage = (ev) => messageHandler(JSON.parse(ev.data));
    ws.onclose = () => {
      connectingEl.classList.remove("hidden");
      titleScreen.classList.add("hidden");
      deadScreen.classList.add("hidden");
      hud.classList.add("hidden");
      joystickWrap.classList.add("hidden");
      actionBtns.classList.add("hidden");
      playing = false;
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  let messageHandler = function(msg) { onMessage(msg); };

  // ===== ROOM LIST STATE =====
  let roomListData = [];
  let rlFilter = "all";
  const roomListScreen = document.getElementById("roomListScreen");
  const createRoomModal = document.getElementById("createRoomModal");

  function showScreen(name) {
    titleScreen.classList.add("hidden");
    roomListScreen.classList.add("hidden");
    createRoomModal.classList.add("hidden");
    if (name === "title") titleScreen.classList.remove("hidden");
    if (name === "rooms") { roomListScreen.classList.remove("hidden"); send({ type: "getRoomList" }); }
  }

  function renderRoomList() {
    const el = document.getElementById("roomList");
    const filtered = rlFilter === "open"
      ? roomListData.filter(r => r.players < r.maxPlayers)
      : roomListData;
    if (filtered.length === 0) {
      el.innerHTML = '<div class="room-empty-msg">No rooms yet. Create one!</div>';
      return;
    }
    el.innerHTML = "";
    filtered.forEach(r => {
      const full = r.players >= r.maxPlayers;
      const div = document.createElement("div");
      div.className = "room-entry";
      div.innerHTML = `
        <div class="room-entry-info">
          <div class="room-entry-name">${escHtml(r.name)}</div>
          <div class="room-entry-mode">${r.isPublic ? "PUBLIC" : "CUSTOM"} · ${r.mode === "ffa-fast" ? "⚡ FFA FAST" : "FFA"}</div>
        </div>
        <div class="room-entry-right">
          <div class="room-entry-players ${full ? 'full'  :''}">${r.players}/${r.maxPlayers}</div>
          <button class="room-entry-join ${full ? 'full-btn' : ''}" data-code="${r.code}" ${full ? "disabled" : ""}>${full ? "FULL" : "JOIN"}</button>
        </div>
      `;
      if (!full) {
        div.querySelector(".room-entry-join").addEventListener("click", () => joinGame(r.code));
        div.querySelector(".room-entry-join").addEventListener("touchstart", (e) => { e.preventDefault(); joinGame(r.code); }, { passive: false });
      }
      el.appendChild(div);
    });
  }

  // Room list tabs
  document.querySelectorAll(".rl-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      rlFilter = tab.dataset.rltab;
      document.querySelectorAll(".rl-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      renderRoomList();
    });
  });

  document.getElementById("rlBtnBack").addEventListener("click", () => showScreen("title"));
  document.getElementById("rlBtnRefresh").addEventListener("click", () => send({ type: "getRoomList" }));
  document.getElementById("rlBtnCreate").addEventListener("click", () => createRoomModal.classList.remove("hidden"));
  document.getElementById("rlBtnCreate").addEventListener("touchstart", (e) => { e.preventDefault(); createRoomModal.classList.remove("hidden"); }, { passive: false });

  document.getElementById("crBtnCancel").addEventListener("click", () => createRoomModal.classList.add("hidden"));
  document.getElementById("crBtnConfirm").addEventListener("click", () => {
    const name = document.getElementById("crName").value.trim() || "Custom Room";
    const maxP = parseInt(document.getElementById("crMaxPlayers").value);
    const mode = document.getElementById("crMode").value;
    send({ type: "createRoom", name, maxPlayers: maxP, mode });
    createRoomModal.classList.add("hidden");
  });
  document.getElementById("crBtnConfirm").addEventListener("touchstart", (e) => {
    e.preventDefault();
    const name = document.getElementById("crName").value.trim() || "Custom Room";
    const maxP = parseInt(document.getElementById("crMaxPlayers").value);
    const mode = document.getElementById("crMode").value;
    send({ type: "createRoom", name, maxPlayers: maxP, mode });
    createRoomModal.classList.add("hidden");
  }, { passive: false });

  function onMessage(msg) {
    if (msg.type === "roomList") {
      roomListData = msg.rooms;
      renderRoomList();
    }
    if (msg.type === "roomCreated") {
      // Auto join the room we just created
      joinGame(msg.code);
    }
    if (msg.type === "roomFull") {
      alert("Room is full!");
    }
    if (msg.type === "init") {
      myId = msg.id;
      mapWidth = msg.mapWidth;
      mapHeight = msg.mapHeight;
      const badge = document.getElementById("roomBadge");
      badge.textContent = msg.roomName;
      badge.style.display = "block";
    }
    if (msg.type === "state") {
      gameState = msg;
      updateHUD();
    }
    if (msg.type === "dead") {
      playing = false;
      finalScore.textContent = `Score: ${msg.score}`;
      deadScreen.classList.remove("hidden");
      hud.classList.add("hidden");
      joystickWrap.classList.add("hidden");
      actionBtns.classList.add("hidden");
      document.getElementById("roomBadge").style.display = "none";
    }
    if (msg.type === "pong") {
      pingMs = Date.now() - pingStart;
      pingLabel.textContent = `${pingMs} ms`;
    }
  }

  // ===== Join =====
  function joinGame(roomCode) {
    const name = nameInput.value.trim() || "Player";
    titleScreen.classList.add("hidden");
    roomListScreen.classList.add("hidden");
    hud.classList.remove("hidden");
    joystickWrap.classList.remove("hidden");
    actionBtns.classList.remove("hidden");
    playing = true;
    send({ type: "join", name, color: selectedColor, room: roomCode || "" });
  }

  document.getElementById("btnPlay").addEventListener("click", () => joinGame(""));
  document.getElementById("btnPlay").addEventListener("touchstart", (e) => { e.preventDefault(); joinGame(""); }, { passive: false });
  nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") joinGame(""); });

  document.getElementById("btnGoRooms").addEventListener("click", () => showScreen("rooms"));
  document.getElementById("btnGoRooms").addEventListener("touchstart", (e) => { e.preventDefault(); showScreen("rooms"); }, { passive: false });

  document.getElementById("btnRespawn").addEventListener("click", () => {
    deadScreen.classList.add("hidden");
    titleScreen.classList.remove("hidden");
  });

  // ===== Ping =====
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      pingStart = Date.now();
      send({ type: "ping" });
    }
  }, 2000);

  // ===== Mouse / Desktop =====
  canvas.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseMoved = true;
    updateWorldMouse();
  });

  canvas.addEventListener("dblclick", () => send({ type: "split" }));
  let wKeyHoldInterval = null;
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); send({ type: "split" }); }
    if (e.code === "KeyW" && !e.repeat) {
      send({ type: "eject" });
      wKeyHoldInterval = setInterval(() => send({ type: "eject" }), 80);
    }
  });
  window.addEventListener("keyup", (e) => {
    if (e.code === "KeyW") {
      clearInterval(wKeyHoldInterval);
      wKeyHoldInterval = null;
    }
  });

  // ===== Action Buttons =====
  document.getElementById("btnSplit").addEventListener("touchstart", (e) => {
    e.preventDefault();
    updateWorldMouse();
    send({ type: "move", x: worldMouseX, y: worldMouseY });
    send({ type: "split" });
  }, { passive: false });

  // Auto-hold eject: fires repeatedly while button is held
  let ejectHoldInterval = null;
  function startEject() {
    updateWorldMouse();
    send({ type: "move", x: worldMouseX, y: worldMouseY });
    send({ type: "eject" });
    if (!ejectHoldInterval) {
      ejectHoldInterval = setInterval(() => { updateWorldMouse(); send({ type: "move", x: worldMouseX, y: worldMouseY }); send({ type: "eject" }); }, 80);
    }
  }
  function stopEject() {
    clearInterval(ejectHoldInterval);
    ejectHoldInterval = null;
  }
  const btnEject = document.getElementById("btnEject");
  btnEject.addEventListener("touchstart", (e) => { e.preventDefault(); startEject(); }, { passive: false });
  btnEject.addEventListener("touchend", (e) => { e.preventDefault(); stopEject(); }, { passive: false });
  btnEject.addEventListener("touchcancel", stopEject);
  btnEject.addEventListener("mousedown", startEject);
  btnEject.addEventListener("mouseup", stopEject);
  btnEject.addEventListener("mouseleave", stopEject);

  document.getElementById("btnSplit").addEventListener("click", () => { updateWorldMouse(); send({ type: "move", x: worldMouseX, y: worldMouseY }); send({ type: "split" }); });

  // ===== Joystick =====
  function getJoyBaseRect() {
    const r = joyBase.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  }

  joyBase.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (joyActive) return;
    const t = e.changedTouches[0];
    joyTouchId = t.identifier;
    joyActive = true;
    const { cx, cy } = getJoyBaseRect();
    joyBaseX = cx; joyBaseY = cy;
    updateJoy(t.clientX, t.clientY);
  }, { passive: false });

  window.addEventListener("touchmove", (e) => {
    if (!joyActive) return;
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        e.preventDefault();
        updateJoy(t.clientX, t.clientY);
        break;
      }
    }
  }, { passive: false });

  window.addEventListener("touchend", (e) => {
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyActive = false;
        joyDx = 0; joyDy = 0;
        joyKnob.style.transform = "translate(-50%, -50%)";
        if (playing) send({ type: "stop" });
        break;
      }
    }
  });

  function updateJoy(cx, cy) {
    const dx = cx - joyBaseX;
    const dy = cy - joyBaseY;
    const len = Math.hypot(dx, dy);
    const clamped = Math.min(len, JOY_RADIUS);
    const angle = Math.atan2(dy, dx);
    const kx = Math.cos(angle) * clamped;
    const ky = Math.sin(angle) * clamped;
    joyKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
    joyDx = kx / JOY_RADIUS;
    joyDy = ky / JOY_RADIUS;
    // Always save last direction
    if (len > 5) lastDirAngle = angle;
  }

  // Touch camera drag (non-joystick)
  let dragTouch = null, dragTouchStart = null, dragCamStart = null;
  canvas.addEventListener("touchstart", (e) => {
    if (!playing) return;
    // Multi-touch: use first free touch for camera if joystick busy
  }, { passive: true });

  // ===== World Mouse Update =====
  let mouseMoved = false;
  function updateWorldMouse() {
    if (joyActive) {
      const myPlayer = gameState.players.find(p => p.id === myId);
      if (myPlayer && myPlayer.blobs.length) {
        const cx = myPlayer.blobs.reduce((s, b) => s + b.x, 0) / myPlayer.blobs.length;
        const cy = myPlayer.blobs.reduce((s, b) => s + b.y, 0) / myPlayer.blobs.length;
        worldMouseX = cx + joyDx * 300;
        worldMouseY = cy + joyDy * 300;
      }
    } else {
      // Use lastDirAngle to keep worldMouse pointing in last direction
      const myPlayer = gameState.players.find(p => p.id === myId);
      if (myPlayer && myPlayer.blobs.length) {
        const cx = myPlayer.blobs.reduce((s, b) => s + b.x, 0) / myPlayer.blobs.length;
        const cy = myPlayer.blobs.reduce((s, b) => s + b.y, 0) / myPlayer.blobs.length;
        worldMouseX = cx + Math.cos(lastDirAngle) * 300;
        worldMouseY = cy + Math.sin(lastDirAngle) * 300;
      }
    }
  }

  // ===== Send Move =====
  let lastSendTime = 0;
  function sendMove() {
    const now = Date.now();
    if (now - lastSendTime < 40) return;
    lastSendTime = now;
    if (!playing) return;
    if (!joyActive) return;
    updateWorldMouse();
    send({ type: "move", x: worldMouseX, y: worldMouseY });
  }

  // ===== Camera =====
  function updateCamera() {
    const myPlayer = gameState.players.find(p => p.id === myId);
    if (myPlayer && myPlayer.blobs.length) {
      const blobs = myPlayer.blobs;

      // Center camera on weighted center of all blobs
      let sumX = 0, sumY = 0;
      blobs.forEach(b => { sumX += b.x; sumY += b.y; });
      targetCamX = sumX / blobs.length;
      targetCamY = sumY / blobs.length;

      // Bounding box of all blobs
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      blobs.forEach(b => {
        minX = Math.min(minX, b.x - b.r);
        minY = Math.min(minY, b.y - b.r);
        maxX = Math.max(maxX, b.x + b.r);
        maxY = Math.max(maxY, b.y + b.r);
      });

      const spreadW = (maxX - minX) * 2.5;
      const spreadH = (maxY - minY) * 2.5;
      const zoomBySpread = Math.min(canvas.width / spreadW, canvas.height / spreadH);

      const maxR = Math.max(...blobs.map(b => b.r));
      const zoomBySize = Math.min(1.2, 90 / (maxR + 30));

      targetZoom = Math.min(zoomBySpread, zoomBySize);
      targetZoom = Math.max(0.03, Math.min(1.2, targetZoom));
    }
    camX += (targetCamX - camX) * 0.25;
    camY += (targetCamY - camY) * 0.25;
    camZoom += (targetZoom - camZoom) * 0.07;
  }

  // ===== HUD =====
  function updateHUD() {
    const myPlayer = gameState.players.find(p => p.id === myId);
    if (myPlayer) {
      scoreLabel.textContent = myPlayer.score.toLocaleString();
    }
    // Leaderboard
    lbEntries.innerHTML = "";
    gameState.leaderboard.forEach((entry, i) => {
      const div = document.createElement("div");
      div.className = "lb-entry" + (entry.name === (myPlayer?.name) ? " lb-me" : "");
      div.innerHTML = `
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-dot" style="background:${entry.color};color:${entry.color}"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(entry.name)}</span>
        <span style="opacity:0.7;font-size:0.65rem">${entry.score}</span>
      `;
      lbEntries.appendChild(div);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ===== GRID RENDER =====
  function drawGrid() {
    const gridSize = 80;
    ctx.strokeStyle = "rgba(0,255,231,0.045)";
    ctx.lineWidth = 1;
    const startX = Math.floor((camX - canvas.width/camZoom/2) / gridSize) * gridSize;
    const startY = Math.floor((camY - canvas.height/camZoom/2) / gridSize) * gridSize;
    const endX = camX + canvas.width/camZoom/2 + gridSize;
    const endY = camY + canvas.height/camZoom/2 + gridSize;
    for (let gx = startX; gx < endX; gx += gridSize) {
      ctx.beginPath();
      ctx.moveTo((gx - camX) * camZoom + canvas.width/2, 0);
      ctx.lineTo((gx - camX) * camZoom + canvas.width/2, canvas.height);
      ctx.stroke();
    }
    for (let gy = startY; gy < endY; gy += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, (gy - camY) * camZoom + canvas.height/2);
      ctx.lineTo(canvas.width, (gy - camY) * camZoom + canvas.height/2);
      ctx.stroke();
    }
  }

  // ===== WORLD BOUNDS =====
  function drawBounds() {
    const x1 = (0 - camX) * camZoom + canvas.width/2;
    const y1 = (0 - camY) * camZoom + canvas.height/2;
    const x2 = (mapWidth - camX) * camZoom + canvas.width/2;
    const y2 = (mapHeight - camY) * camZoom + canvas.height/2;
    ctx.strokeStyle = "rgba(0,255,231,0.4)";
    ctx.lineWidth = 3;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    // Glow
    ctx.shadowColor = "#00ffe7";
    ctx.shadowBlur = 12;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    ctx.shadowBlur = 0;
  }

  // ===== DRAW FOOD =====
  function drawFood() {
    gameState.food.forEach(f => {
      const sx = (f.x - camX) * camZoom + canvas.width/2;
      const sy = (f.y - camY) * camZoom + canvas.height/2;
      const sr = f.r * camZoom;
      if (sx + sr < 0 || sx - sr > canvas.width || sy + sr < 0 || sy - sr > canvas.height) return;
      ctx.beginPath();
      ctx.arc(sx, sy, Math.max(1.5, sr), 0, Math.PI*2);
      ctx.fillStyle = f.color;
      ctx.fill();
    });
  }

  // ===== DRAW VIRUSES =====
  function drawViruses() {
    gameState.viruses.forEach(v => {
      const sx = (v.x - camX) * camZoom + canvas.width/2;
      const sy = (v.y - camY) * camZoom + canvas.height/2;
      const sr = v.r * camZoom;
      if (sx + sr < 0 || sx - sr > canvas.width || sy + sr < 0 || sy - sr > canvas.height) return;
      // Spiky virus
      const spikes = 12;
      ctx.beginPath();
      for (let i = 0; i <= spikes * 2; i++) {
        const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI/2;
        const r = i % 2 === 0 ? sr : sr * 0.72;
        const px = sx + Math.cos(angle) * r;
        const py = sy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(0,220,80,0.25)";
      ctx.fill();
      ctx.strokeStyle = "#00dc50";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#00dc50";
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });
  }

  // ===== DRAW BLOB =====
  function drawBlob(b, color, name, isMe, totalBlobs, dirAngle) {
    const sx = (b.x - camX) * camZoom + canvas.width/2;
    const sy = (b.y - camY) * camZoom + canvas.height/2;
    const sr = b.r * camZoom;
    if (sx + sr < -50 || sx - sr > canvas.width+50 || sy + sr < -50 || sy - sr > canvas.height+50) return;

    // Glow for self
    if (isMe) {
      ctx.shadowColor = color;
      ctx.shadowBlur = sr * 0.45;
    }

    // Blob body
    const grad = ctx.createRadialGradient(sx - sr*0.3, sy - sr*0.3, 0, sx, sy, sr);
    grad.addColorStop(0, lightenColor(color, 40));
    grad.addColorStop(0.6, color);
    grad.addColorStop(1, darkenColor(color, 30));
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Border
    ctx.strokeStyle = isMe ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.18)";
    ctx.lineWidth = isMe ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Direction arrow on blob edge (only when moving and blob is big enough)
    if (dirAngle !== null && sr > 12) {
      const arrowLen = Math.max(7, sr * 0.38);
      const arrowW = Math.max(4, sr * 0.22);
      const ex = sx + Math.cos(dirAngle) * (sr + arrowLen * 0.3);
      const ey = sy + Math.sin(dirAngle) * (sr + arrowLen * 0.3);
      // Tip of arrow
      const tx = ex + Math.cos(dirAngle) * arrowLen;
      const ty = ey + Math.sin(dirAngle) * arrowLen;
      // Left & right base corners
      const perp = dirAngle + Math.PI / 2;
      const lx = ex + Math.cos(perp) * arrowW;
      const ly = ey + Math.sin(perp) * arrowW;
      const rx = ex - Math.cos(perp) * arrowW;
      const ry = ey - Math.sin(perp) * arrowW;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(lx, ly);
      ctx.lineTo(rx, ry);
      ctx.closePath();
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.shadowColor = "rgba(0,0,0,0.6)";
      ctx.shadowBlur = 3;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Name + score (only on largest blob or single)
    if (sr > 18 && (totalBlobs === 1 || b === null)) {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const fontSize = Math.max(10, Math.min(sr * 0.38, 22));
      ctx.font = `700 ${fontSize}px 'Exo 2', sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.shadowBlur = 4;
      ctx.fillText(name, sx, sy);
      ctx.shadowBlur = 0;
    }
  }

  // ===== DRAW PLAYERS =====
  function drawPlayers() {
    const myPlayer = gameState.players.find(p => p.id === myId);
    const others = gameState.players.filter(p => p.id !== myId);
    [...others, ...(myPlayer ? [myPlayer] : [])].forEach(p => {
      p.blobs.forEach((b) => {
        let dirAngle = null;
        if (p.id === myId) {
          // Always show arrow using last known direction
          dirAngle = lastDirAngle;
        }
        drawBlob(b, p.color, p.name, p.id === myId, p.blobs.length, dirAngle);
      });
    });
  }

  // ===== COLOR HELPERS =====
  function lightenColor(hsl, amt) {
    return hsl.replace(/hsl\((\d+),(\d+)%,(\d+)%\)/, (_, h, s, l) =>
      `hsl(${h},${s}%,${Math.min(100, parseInt(l)+amt)}%)`);
  }
  function darkenColor(hsl, amt) {
    return hsl.replace(/hsl\((\d+),(\d+)%,(\d+)%\)/, (_, h, s, l) =>
      `hsl(${h},${s}%,${Math.max(0, parseInt(l)-amt)}%)`);
  }

  // ===== BACKGROUND =====
  function drawBackground() {
    ctx.fillStyle = "#04070f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ===== MAIN LOOP =====
  let lastFrame = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = ts - lastFrame;
    lastFrame = ts;

    if (!playing) return;

    sendMove();
    updateCamera();

    drawBackground();
    drawGrid();
    drawBounds();
    drawFood();
    drawViruses();
    drawPlayers();
  }

  requestAnimationFrame(loop);

  // ===== CHAT =====
  const chatPanel = document.getElementById("chatPanel");
  const chatToggleBtn = document.getElementById("chatToggleBtn");
  const chatCloseBtn = document.getElementById("chatCloseBtn");
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const chatSendBtn = document.getElementById("chatSendBtn");
  const chatUnread = document.getElementById("chatUnread");
  const chatTabs = document.querySelectorAll(".chat-tab");

  let chatOpen = false;
  let activeTab = "all";
  let unreadCount = 0;
  const allMessages = []; // { tab, sender, color, text, ts }

  function openChat() {
    chatOpen = true;
    chatPanel.style.display = "flex";
    requestAnimationFrame(() => chatPanel.classList.add("open"));
    unreadCount = 0;
    chatUnread.style.display = "none";
    chatUnread.textContent = "";
    renderMessages();
    setTimeout(() => chatInput.focus(), 300);
  }

  function closeChat() {
    chatOpen = false;
    chatPanel.classList.remove("open");
    setTimeout(() => { chatPanel.style.display = "none"; }, 280);
  }

  chatToggleBtn.addEventListener("click", () => chatOpen ? closeChat() : openChat());
  chatCloseBtn.addEventListener("click", closeChat);

  chatTabs.forEach(tab => {
    tab.addEventListener("click", () => {
      activeTab = tab.dataset.tab;
      chatTabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      renderMessages();
    });
  });

  function formatTime(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
  }

  function renderMessages() {
    const filtered = activeTab === "all"
      ? allMessages
      : allMessages.filter(m => m.tab === activeTab || m.tab === "all");
    chatMessages.innerHTML = "";
    filtered.slice(-80).forEach(m => {
      const div = document.createElement("div");
      div.className = "chat-msg" + (m.sender === "SERVER" ? " server" : "");
      div.innerHTML = `
        <span class="chat-msg-sender" style="color:${m.color}">${escHtml(m.sender)}:</span>
        <span class="chat-msg-text">${escHtml(m.text)}</span>
        <span class="chat-msg-time">${formatTime(m.ts)}</span>
      `;
      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addChatMessage(msg) {
    allMessages.push(msg);
    if (allMessages.length > 200) allMessages.shift();
    if (chatOpen) {
      renderMessages();
    } else {
      unreadCount++;
      chatUnread.textContent = unreadCount > 9 ? "9+" : unreadCount;
      chatUnread.style.display = "flex";
    }
  }

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    send({ type: "chat", text });
    chatInput.value = "";
    chatInput.blur();
  }

  chatSendBtn.addEventListener("click", sendChat);
  chatSendBtn.addEventListener("touchstart", (e) => { e.preventDefault(); sendChat(); }, { passive: false });
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); sendChat(); }
  });

  // Show chat button when playing
  const origJoinGame = joinGame;
  function showChatUI() {
    chatToggleBtn.style.display = "flex";
  }

  // Extend messageHandler to include chat
  messageHandler = function(msg) {
    onMessage(msg);
    if (msg.type === "chat") addChatMessage(msg);
    if (msg.type === "kill") addKillFeed(msg.killer, msg.killerColor, msg.victim, msg.victimColor);
    if (msg.type === "init") chatToggleBtn.style.display = "flex";
    if (msg.type === "state" && playing) chatToggleBtn.style.display = "flex";
    if (msg.type === "dead") { chatToggleBtn.style.display = "none"; closeChat(); }
  };

  // ===== CONNECT =====
  connect();

})();
</script>
</body>
