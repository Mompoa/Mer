<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nebulous · Blob Wars</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon: #00ffe7;
    --neon2: #ff00aa;
    --neon3: #ffe000;
    --bg: #04070f;
    --panel: rgba(0,20,40,0.92);
    --border: rgba(0,255,231,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
    color: #fff;
    touch-action: none;
  }

  /* ===== CANVAS ===== */
  #gameCanvas {
    position: fixed;
    inset: 0;
    display: block;
    cursor: none;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at 50% 30%, #001a35 0%, #04070f 70%);
  }

  .screen.hidden { display: none; }

  /* --- Title Screen --- */
  #titleScreen .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 10vw, 5.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--neon) 0%, var(--neon2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,231,0.5));
    animation: pulseGlow 2.5s ease-in-out infinite;
    text-align: center;
  }

  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,231,0.4)); }
    50% { filter: drop-shadow(0 0 50px rgba(0,255,231,0.9)); }
  }

  #titleScreen .subtitle {
    font-size: clamp(0.8rem, 3vw, 1rem);
    color: rgba(0,255,231,0.5);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 0.4rem;
    margin-bottom: 3rem;
  }

  .input-wrap {
    position: relative;
    width: min(360px, 88vw);
    margin-bottom: 1.5rem;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1.1rem;
    color: #fff;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .input-wrap input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(0,255,231,0.2);
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-play {
    width: min(360px, 88vw);
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--neon) 0%, #00b8a9 100%);
    border: none;
    border-radius: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #04070f;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s;
    box-shadow: 0 0 30px rgba(0,255,231,0.35);
    -webkit-tap-highlight-color: transparent;
  }

  .btn-play:active { transform: scale(0.97); }
  .btn-play:hover { box-shadow: 0 0 50px rgba(0,255,231,0.6); }

  #roomBadge {
    position: fixed;
    top: 54px; left: 50%; transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    color: rgba(0,255,231,0.6);
    padding: 4px 14px;
    z-index: 50;
    letter-spacing: 0.12em;
    display: none;
  }

  /* ===== ROOM LIST SCREEN ===== */
  #roomListScreen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: #04070f;
    z-index: 100;
  }
  #roomListScreen.hidden { display: none; }

  .rl-header {
    background: rgba(0,20,50,0.98);
    border-bottom: 1.5px solid var(--border);
    padding: 12px 14px 0;
    flex-shrink: 0;
  }
  .rl-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 900;
    color: var(--neon);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 10px;
  }
  .rl-tabs {
    display: flex;
  }
  .rl-tab {
    flex: 1;
    padding: 9px 4px;
    background: rgba(0,30,60,0.5);
    border: 1px solid rgba(0,255,231,0.1);
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .rl-tab:first-child { border-radius: 8px 0 0 0; }
  .rl-tab:last-child { border-radius: 0 8px 0 0; }
  .rl-tab.active { color: var(--neon); background: rgba(0,255,231,0.08); border-color: var(--neon); }

  #rlList {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #rlList::-webkit-scrollbar { width: 3px; }
  #rlList::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.15); }

  .rl-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,255,231,0.06);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    gap: 10px;
  }
  .rl-item:active { background: rgba(0,40,80,0.5); }

  .rl-item-info { flex: 1; min-width: 0; }
  .rl-item-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .rl-item-sub {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.4);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .rl-admin { color: #ffcc00; font-weight: 700; }
  .rl-count { font-weight: 700; }
  .rl-count.full { color: #ff4444; }
  .rl-count.open { color: #44ff88; }

  .rl-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .rl-mode {
    font-size: 0.6rem;
    color: rgba(255,200,0,0.8);
    font-weight: 700;
    text-align: right;
    line-height: 1.3;
  }
  .rl-join-btn {
    background: rgba(0,255,231,0.1);
    border: 1.5px solid rgba(0,255,231,0.3);
    border-radius: 8px;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .rl-join-btn.full { border-color: rgba(255,100,100,0.3); color: #ff6666; cursor: not-allowed; }

  .rl-empty {
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 0.8rem;
    margin-top: 60px;
    line-height: 2;
    font-family: 'Exo 2', sans-serif;
  }

  .rl-bottom {
    display: flex;
    background: rgba(0,15,40,0.98);
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
  }
  .rl-btn {
    flex: 1;
    padding: 14px 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .rl-btn:active { opacity: 0.8; }
  #rlBtnCreate { background: #2a2a2a; color: #fff; }
  #rlBtnJoin   { background: #1a1a2e; color: rgba(255,255,255,0.5); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  #rlBtnDone   { background: #2a2a2a; color: #fff; }

  /* ===== CREATE ROOM MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    z-index: 200;
    background: rgba(0,5,15,0.88);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: rgba(0,15,35,0.99);
    border: 1.5px solid var(--neon);
    border-radius: 20px;
    padding: 26px 22px 22px;
    width: min(360px, 92vw);
    box-shadow: 0 0 50px rgba(0,255,231,0.1);
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem;
    font-weight: 900;
    color: var(--neon);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 20px;
  }
  .modal-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    color: rgba(0,255,231,0.55);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .modal-input {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem;
    color: #fff;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--neon); }
  .modal-input::placeholder { color: rgba(255,255,255,0.22); }
  .modal-slider-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .modal-slider-row input[type=range] {
    flex: 1; accent-color: var(--neon); height: 4px;
  }
  .modal-slider-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--neon3);
    min-width: 32px;
    text-align: right;
  }
  .modal-toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-toggle-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
  }
  .toggle-switch {
    position: relative; width: 44px; height: 24px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider:before {
    content: ""; position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff; border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--neon2); }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn-cancel {
    flex: 1; padding: 0.8rem; border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5);
    font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.08em;
  }
  .modal-btn-confirm {
    flex: 2; padding: 0.8rem; border-radius: 10px;
    background: linear-gradient(135deg, var(--neon2), #aa0077);
    border: none; color: #fff;
    font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.08em;
    box-shadow: 0 0 20px rgba(255,0,170,0.25);
  }
  .modal-btn-cancel:active, .modal-btn-confirm:active { transform: scale(0.97); }

  /* ===== PLAY / NAME SCREEN ===== */
  #playScreen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,7,15,0.95);
    backdrop-filter: blur(10px);
    z-index: 150;
  }
  #playScreen.hidden { display: none; }
  .play-box {
    background: rgba(0,10,28,0.98);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 24px 22px 20px;
    width: min(360px, 92vw);
  }
  .play-room-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem; font-weight: 900;
    color: var(--neon3);
    text-align: center;
    letter-spacing: 0.12em;
    margin-bottom: 18px;
    text-shadow: 0 0 12px rgba(255,224,0,0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .play-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    color: rgba(0,255,231,0.55);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .play-name-input {
    width: 100%;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1.05rem; color: #fff;
    outline: none; margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .play-name-input:focus { border-color: var(--neon); }
  .play-name-input::placeholder { color: rgba(255,255,255,0.22); }
  .btn-play-now {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #e600cc, #aa0077);
    border: none; border-radius: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 1rem; font-weight: 700;
    color: #fff; letter-spacing: 0.12em;
    cursor: pointer; margin-bottom: 10px;
    box-shadow: 0 0 28px rgba(230,0,200,0.35);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-play-now:active { transform: scale(0.97); }
  .btn-leave-room {
    width: 100%; padding: 0.7rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.68rem; font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-leave-room:active { color: #fff; }

  /* ===== DEAD SCREEN (stays in room) ===== */
  #deadScreen {
    background: rgba(4,7,15,0.93);
    backdrop-filter: blur(6px);
  }
  #deadBox {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(0,10,28,0.98);
    border: 1.5px solid rgba(255,0,170,0.3);
    border-radius: 20px;
    padding: 32px 28px 24px;
    width: min(340px, 88vw);
  }
  #deadBox h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    color: var(--neon2);
    filter: drop-shadow(0 0 20px rgba(255,0,170,0.6));
    animation: shake 0.4s ease;
    margin-bottom: 0.5rem;
  }
  #deadBox .score-big {
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    color: var(--neon3); font-weight: 600; margin-bottom: 2rem;
  }
  .btn-respawn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #e600cc, #aa0077);
    border: none; border-radius: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 1rem; font-weight: 700;
    color: #fff; letter-spacing: 0.12em;
    cursor: pointer; margin-bottom: 10px;
    box-shadow: 0 0 28px rgba(230,0,200,0.3);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-respawn:active { transform: scale(0.97); }

  /* error toast */
  #errorToast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(255,50,50,0.95); color: #fff;
    font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.1em; padding: 10px 22px;
    border-radius: 20px; z-index: 300; display: none;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
  }

  .orbs-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: -1;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px, -60px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.9); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* --- Dead Screen --- */
  #deadScreen {
    background: rgba(4,7,15,0.92);
    backdrop-filter: blur(6px);
  }

  #deadScreen h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: var(--neon2);
    filter: drop-shadow(0 0 20px rgba(255,0,170,0.6));
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 60%{transform:translateX(12px)} 80%{transform:translateX(-6px)}
  }

  #deadScreen .score-big {
    font-size: clamp(1.2rem, 5vw, 2rem);
    color: var(--neon3);
    margin: 0.8rem 0 2.5rem;
    font-weight: 600;
  }

  /* ===== HUD ===== */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 50;
  }

  #hud.hidden { display: none; }

  .hud-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 3.5vw, 1.3rem);
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 12px rgba(0,255,231,0.7);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 30px;
    min-width: 80px;
    text-align: center;
  }

  /* Leaderboard */
  #leaderboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    min-width: 150px;
    backdrop-filter: blur(6px);
  }

  #leaderboard h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }

  .lb-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.85);
    padding: 2px 0;
  }

  .lb-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .lb-me { color: var(--neon3); font-weight: 700; }
  .lb-rank { opacity: 0.5; font-size: 0.65rem; min-width: 14px; }

  /* ===== TOUCH JOYSTICK ===== */
  #joystickWrap {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 60;
    pointer-events: none;
  }

  #joystickWrap.hidden { display: none; }

  #joyBase {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(0,255,231,0.06);
    border: 2px solid rgba(0,255,231,0.2);
    position: relative;
    pointer-events: all;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  #joyKnob {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(0,255,231,0.9), rgba(0,180,170,0.6));
    border: 2px solid var(--neon);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    box-shadow: 0 0 18px rgba(0,255,231,0.5);
    pointer-events: none;
  }

  /* ===== ACTION BUTTONS ===== */
  #actionBtns {
    position: fixed;
    bottom: 24px; right: 20px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  #actionBtns.hidden { display: none; }

  .act-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 3px;
    transition: transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }

  .act-btn:active { transform: scale(0.9); }

  .act-btn .icon { font-size: 1.3rem; }

  #btnSplit {
    background: radial-gradient(circle at 35% 35%, rgba(255,0,170,0.8), rgba(180,0,120,0.5));
    border-color: var(--neon2);
    box-shadow: 0 0 20px rgba(255,0,170,0.4);
  }

  #btnEject {
    background: radial-gradient(circle at 35% 35%, rgba(255,224,0,0.7), rgba(180,140,0,0.4));
    border-color: var(--neon3);
    box-shadow: 0 0 20px rgba(255,224,0,0.3);
  }

  /* ===== CONNECTING INDICATOR ===== */
  #connecting {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,7,15,0.8);
    z-index: 200;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    color: var(--neon);
    letter-spacing: 0.15em;
  }

  #connecting.hidden { display: none; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(0,255,231,0.15);
    border-top-color: var(--neon);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }



  /* ===== PING ===== */
  #pingLabel {
    position: fixed; bottom: 8px; right: 8px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    z-index: 50;
    font-family: 'Exo 2', sans-serif;
  }

  /* ===== CHAT BUTTON ===== */
  #chatToggleBtn {
    position: fixed;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 60;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 18px;
    cursor: pointer;
    display: none;
    align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow 0.2s;
  }
  #chatToggleBtn:active { box-shadow: 0 0 16px rgba(0,255,231,0.4); }
  #chatUnread {
    background: var(--neon2);
    color: #fff;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 0.55rem;
    display: none;
    align-items: center; justify-content: center;
    font-family: 'Exo 2', sans-serif;
  }

  /* ===== CHAT PANEL ===== */
  #chatPanel {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 55vh;
    max-height: 420px;
    background: rgba(3, 12, 28, 0.96);
    border-bottom: 1.5px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 80;
    display: none;
    flex-direction: column;
    transform: translateY(-100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  }
  #chatPanel.open {
    transform: translateY(0);
  }

  /* Chat header */
  #chatHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 0;
    flex-shrink: 0;
  }
  #chatTitle {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 0.15em;
  }
  #chatCloseBtn {
    background: rgba(255,0,100,0.2);
    border: 1.5px solid rgba(255,0,100,0.4);
    border-radius: 8px;
    color: #ff4466;
    font-size: 1rem;
    width: 30px; height: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  /* Tabs */
  #chatTabs {
    display: flex;
    gap: 4px;
    padding: 8px 14px 0;
    flex-shrink: 0;
  }
  .chat-tab {
    flex: 1;
    padding: 6px 0;
    background: rgba(0,255,231,0.05);
    border: 1px solid rgba(0,255,231,0.12);
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chat-tab.active {
    background: rgba(0,255,231,0.15);
    border-color: var(--neon);
    color: var(--neon);
  }

  /* Messages */
  #chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
  }
  #chatMessages::-webkit-scrollbar { width: 3px; }
  #chatMessages::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.2); border-radius: 2px; }

  .chat-msg {
    display: flex;
    gap: 6px;
    align-items: baseline;
    font-size: 0.78rem;
    line-height: 1.4;
    animation: fadeInMsg 0.2s ease;
  }
  @keyframes fadeInMsg { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .chat-msg-sender {
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.72rem;
  }
  .chat-msg-time {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }
  .chat-msg-text { color: rgba(255,255,255,0.85); word-break: break-word; }
  .chat-msg.server .chat-msg-text { font-style: italic; }

  /* Input row */
  #chatInputRow {
    display: flex;
    gap: 8px;
    padding: 8px 14px 12px;
    flex-shrink: 0;
    border-top: 1px solid rgba(0,255,231,0.08);
  }
  #chatInput {
    flex: 1;
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    color: #fff;
    outline: none;
  }
  #chatInput:focus { border-color: var(--neon); }
  #chatSendBtn {
    background: linear-gradient(135deg, var(--neon), #00b8a9);
    border: none;
    border-radius: 10px;
    color: #04070f;
    font-size: 1.1rem;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- ===== CONNECTING ===== -->
<div id="connecting">
  <div class="spinner"></div>
  CONNECTING…
</div>

<!-- ===== ROOM LIST SCREEN ===== -->
<div id="roomListScreen" class="hidden">
  <div class="rl-header">
    <div class="rl-title">⚡ NEBULOUS · BLOB WARS</div>
    <div class="rl-tabs">
      <div class="rl-tab active">CUSTOM GAMES</div>
      <div class="rl-tab">CHAT</div>
      <div class="rl-tab">FRIENDS</div>
    </div>
  </div>
  <div id="rlList">
    <div class="rl-empty" id="rlEmpty">No rooms yet.<br>Press <b>CREATE</b> to make one!</div>
  </div>
  <div class="rl-bottom">
    <button class="rl-btn" id="rlBtnCreate">CREATE</button>
    <button class="rl-btn" id="rlBtnJoin">JOIN</button>
    <button class="rl-btn" id="rlBtnDone">DONE</button>
  </div>
</div>

<!-- ===== CREATE ROOM MODAL ===== -->
<div id="createModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">CREATE ROOM</div>
    <div class="modal-label">ROOM NAME</div>
    <input class="modal-input" id="newRoomName" type="text" placeholder="e.g. TRICK MODE HUGE" maxlength="24" autocomplete="off" spellcheck="false">
    <div class="modal-label">MAX PLAYERS: <span id="sliderLabel">10</span></div>
    <div class="modal-slider-row">
      <input type="range" id="maxPlayersSlider" min="2" max="30" value="10" step="1">
      <div class="modal-slider-val" id="sliderVal">10</div>
    </div>
    <div class="modal-toggle-row">
      <span class="modal-toggle-label">HIDDEN ROOM</span>
      <label class="toggle-switch">
        <input type="checkbox" id="hiddenToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="btnCreateCancel">CANCEL</button>
      <button class="modal-btn-confirm" id="btnCreateConfirm">CREATE &amp; JOIN</button>
    </div>
  </div>
</div>

<!-- ===== JOIN BY CODE MODAL ===== -->
<div id="joinModal" class="modal-overlay hidden">
  <div class="modal-box" style="border-color:var(--neon3);box-shadow:0 0 40px rgba(255,224,0,0.1)">
    <div class="modal-title" style="color:var(--neon3)">JOIN BY NAME</div>
    <div class="modal-label">ROOM NAME</div>
    <input class="modal-input" id="joinRoomName" type="text" placeholder="Enter room name…" maxlength="24" autocomplete="off" spellcheck="false">
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="btnJoinCancel">CANCEL</button>
      <button class="modal-btn-confirm" id="btnJoinConfirm" style="background:linear-gradient(135deg,var(--neon3),#aa8800);color:#04070f;">SEARCH &amp; JOIN</button>
    </div>
  </div>
</div>

<!-- ===== PLAY / NAME ENTRY SCREEN ===== -->
<div id="playScreen" class="hidden">
  <div class="play-box">
    <div class="play-room-name" id="playRoomLabel">ROOM</div>
    <div class="play-label">YOUR NAME</div>
    <input class="play-name-input" id="playNameInput" type="text" placeholder="Enter your name…" maxlength="16" autocomplete="off" spellcheck="false">
    <button class="btn-play-now" id="btnPlayNow">▶ PLAY</button>
    <button class="btn-leave-room" id="btnLeavePlay">← LEAVE ROOM</button>
  </div>
</div>

<!-- ===== ROOM BADGE ===== -->
<div id="roomBadge"></div>

<!-- ===== DEAD SCREEN (stays in room) ===== -->
<div id="deadScreen" class="screen hidden">
  <div id="deadBox">
    <h2>YOU DIED</h2>
    <div class="score-big" id="finalScore">Score: 0</div>
    <button class="btn-respawn" id="btnRespawn">▶ RESPAWN</button>
    <button class="btn-leave-room" id="btnLeaveDead">← LEAVE ROOM</button>
  </div>
</div>

<!-- ===== ERROR TOAST ===== -->
<div id="errorToast"></div>

<!-- ===== CHAT TOGGLE BUTTON ===== -->
<button id="chatToggleBtn">💬 CHAT <span id="chatUnread"></span></button>

<!-- ===== CHAT PANEL ===== -->
<div id="chatPanel">
  <div id="chatHeader">
    <span id="chatTitle">💬 CHAT</span>
    <button id="chatCloseBtn">✕</button>
  </div>
  <div id="chatTabs">
    <button class="chat-tab active" data-tab="all">ALL</button>
    <button class="chat-tab" data-tab="game">GAME</button>
  </div>
  <div id="chatMessages"></div>
  <div id="chatInputRow">
    <input id="chatInput" type="text" placeholder="Say something…" maxlength="120" autocomplete="off">
    <button id="chatSendBtn">➤</button>
  </div>
</div>

<!-- ===== GAME CANVAS ===== -->
<canvas id="gameCanvas"></canvas>

<!-- ===== HUD ===== -->
<div id="hud" class="hidden">
  <div class="hud-score" id="scoreLabel">0</div>
  <div id="leaderboard">
    <h3>⚡ Top Players</h3>
    <div id="lbEntries"></div>
  </div>
</div>



<!-- ===== JOYSTICK ===== -->
<div id="joystickWrap" class="hidden">
  <div id="joyBase">
    <div id="joyKnob"></div>
  </div>
</div>

<!-- ===== ACTION BUTTONS ===== -->
<div id="actionBtns" class="hidden">
  <button class="act-btn" id="btnSplit">
    <span class="icon">💥</span>SPLIT
  </button>
  <button class="act-btn" id="btnEject">
    <span class="icon">🔵</span>EJECT
  </button>
</div>

<!-- ===== PING ===== -->
<div id="pingLabel">-- ms</div>

<script>
(() => {
  // ===== DOM =====
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const deadScreen = document.getElementById("deadScreen");
  const connectingEl = document.getElementById("connecting");
  const hud = document.getElementById("hud");
  const joystickWrap = document.getElementById("joystickWrap");
  const actionBtns = document.getElementById("actionBtns");
  const scoreLabel = document.getElementById("scoreLabel");
  const lbEntries = document.getElementById("lbEntries");
  const finalScore = document.getElementById("finalScore");
  const joyBase = document.getElementById("joyBase");
  const joyKnob = document.getElementById("joyKnob");
  const pingLabel = document.getElementById("pingLabel");

  // ===== STATE =====
  let ws = null;
  let myId = null;
  let mapWidth = 4000, mapHeight = 4000;
  let gameState = { players: [], food: [], viruses: [], leaderboard: [] };
  let camX = 0, camY = 0, camZoom = 1;
  let targetCamX = 0, targetCamY = 0, targetZoom = 1;
  let mouseX = 0, mouseY = 0;
  let worldMouseX = 0, worldMouseY = 0;
  let playing = false;
  let pingStart = 0, pingMs = 0;
  let pendingRoom = { code: "", name: "" };
  let currentRoomCode = "";

  // Joystick state
  let joyActive = false, joyTouchId = null;
  let joyBaseX = 0, joyBaseY = 0;
  let joyDx = 0, joyDy = 0;
  const JOY_RADIUS = 60;

  // ===== RESIZE =====
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  // ===== HELPERS =====
  function showErrorToast(text) {
    const t = document.getElementById("errorToast");
    t.textContent = text;
    t.style.display = "block";
    clearTimeout(t._t);
    t._t = setTimeout(() => t.style.display = "none", 3000);
  }

  function escHtml2(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ===== ROOM LIST =====
  function renderRoomList(rooms) {
    const list = document.getElementById("rlList");
    const empty = document.getElementById("rlEmpty");
    list.querySelectorAll(".rl-item").forEach(el => el.remove());
    if (!rooms || rooms.length === 0) { empty.style.display = "block"; return; }
    empty.style.display = "none";
    rooms.forEach(room => {
      const full = room.players >= room.maxPlayers;
      const item = document.createElement("div");
      item.className = "rl-item";
      item.innerHTML = `
        <div class="rl-item-info">
          <div class="rl-item-name">${escHtml2(room.name)}</div>
          <div class="rl-item-sub">
            <span class="rl-count ${full ? 'full' : 'open'}">${room.players}/${room.maxPlayers} ADMIN</span>
          </div>
        </div>
        <div class="rl-right">
          <div class="rl-mode">MAYHEM<br>WALLS<br>X64</div>
          <button class="rl-join-btn ${full ? 'full' : ''}" data-code="${room.code}" data-name="${escHtml2(room.name)}">${full ? 'FULL' : 'JOIN'}</button>
        </div>
      `;
      if (!full) {
        item.addEventListener("click", () => showPlayScreen(room.code, room.name));
        item.querySelector(".rl-join-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          showPlayScreen(room.code, room.name);
        });
      }
      list.appendChild(item);
    });
  }

  // ===== PLAY SCREEN =====
  function showPlayScreen(code, name) {
    pendingRoom = { code, name };
    document.getElementById("playRoomLabel").textContent = name || "PUBLIC ROOM";
    document.getElementById("roomListScreen").classList.add("hidden");
    document.getElementById("createModal").classList.add("hidden");
    document.getElementById("joinModal").classList.add("hidden");
    document.getElementById("playScreen").classList.remove("hidden");
    document.getElementById("playNameInput").focus();
  }

  function startGame() {
    const name = document.getElementById("playNameInput").value.trim() || "Player";
    document.getElementById("playScreen").classList.add("hidden");
    hud.classList.remove("hidden");
    joystickWrap.classList.remove("hidden");
    actionBtns.classList.remove("hidden");
    playing = true;
    send({ type: "join", name, room: pendingRoom.code });
  }

  document.getElementById("btnPlayNow").addEventListener("click", startGame);
  document.getElementById("playNameInput").addEventListener("keydown", e => { if (e.key === "Enter") startGame(); });

  document.getElementById("btnLeavePlay").addEventListener("click", () => {
    document.getElementById("playScreen").classList.add("hidden");
    document.getElementById("roomListScreen").classList.remove("hidden");
    send({ type: "getRooms" });
  });

  // ===== DEAD SCREEN — stays in room =====
  document.getElementById("btnRespawn").addEventListener("click", () => {
    deadScreen.classList.add("hidden");
    // Show play screen again with same room
    showPlayScreen(currentRoomCode, currentRoomCode);
  });

  document.getElementById("btnLeaveDead").addEventListener("click", () => {
    deadScreen.classList.add("hidden");
    document.getElementById("roomListScreen").classList.remove("hidden");
    currentRoomCode = "";
    send({ type: "getRooms" });
  });

  // ===== ROOM LIST BUTTONS =====
  document.getElementById("rlBtnCreate").addEventListener("click", () => {
    document.getElementById("createModal").classList.remove("hidden");
    document.getElementById("newRoomName").focus();
  });

  document.getElementById("rlBtnJoin").addEventListener("click", () => {
    document.getElementById("joinModal").classList.remove("hidden");
    document.getElementById("joinRoomName").focus();
  });

  document.getElementById("rlBtnDone").addEventListener("click", () => {
    showPlayScreen("", "PUBLIC ROOM");
  });

  // Slider
  const slider = document.getElementById("maxPlayersSlider");
  slider.addEventListener("input", () => {
    document.getElementById("sliderVal").textContent = slider.value;
    document.getElementById("sliderLabel").textContent = slider.value;
  });

  // Create modal
  document.getElementById("btnCreateCancel").addEventListener("click", () => {
    document.getElementById("createModal").classList.add("hidden");
  });
  document.getElementById("btnCreateConfirm").addEventListener("click", () => {
    const name = document.getElementById("newRoomName").value.trim() || "My Room";
    const maxPlayers = parseInt(slider.value) || 10;
    const hidden = document.getElementById("hiddenToggle").checked;
    document.getElementById("createModal").classList.add("hidden");
    send({ type: "createRoom", name, maxPlayers, hidden });
  });

  // Join by name modal
  document.getElementById("btnJoinCancel").addEventListener("click", () => {
    document.getElementById("joinModal").classList.add("hidden");
  });
  document.getElementById("btnJoinConfirm").addEventListener("click", () => {
    const searchName = document.getElementById("joinRoomName").value.trim();
    document.getElementById("joinModal").classList.add("hidden");
    if (searchName) showPlayScreen("", searchName);
  });

  // ===== WebSocket =====
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const url = `${proto}://${location.host}`;
    ws = new WebSocket(url);
    ws.onopen = () => {
      connectingEl.classList.add("hidden");
      document.getElementById("roomListScreen").classList.remove("hidden");
      send({ type: "getRooms" });
    };
    ws.onmessage = (ev) => messageHandler(JSON.parse(ev.data));
    ws.onclose = () => {
      connectingEl.classList.remove("hidden");
      document.getElementById("roomListScreen").classList.add("hidden");
      document.getElementById("playScreen").classList.add("hidden");
      deadScreen.classList.add("hidden");
      hud.classList.add("hidden");
      joystickWrap.classList.add("hidden");
      actionBtns.classList.add("hidden");
      playing = false;
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  let messageHandler = function(msg) { onMessage(msg); };

  function onMessage(msg) {
    if (msg.type === "roomList") {
      renderRoomList(msg.rooms);
    }
    if (msg.type === "roomCreated") {
      showPlayScreen(msg.code, msg.name || msg.code);
    }
    if (msg.type === "error") {
      showErrorToast(msg.text);
    }
    if (msg.type === "init") {
      myId = msg.id;
      mapWidth = msg.mapWidth;
      mapHeight = msg.mapHeight;
      currentRoomCode = msg.roomCode;
      const badge = document.getElementById("roomBadge");
      badge.textContent = `ROOM: ${msg.roomCode}`;
      badge.style.display = "block";
    }
    if (msg.type === "state") {
      gameState = msg;
      updateHUD();
    }
    if (msg.type === "dead") {
      playing = false;
      finalScore.textContent = `Score: ${msg.score}`;
      deadScreen.classList.remove("hidden");
      hud.classList.add("hidden");
      joystickWrap.classList.add("hidden");
      actionBtns.classList.add("hidden");
      document.getElementById("roomBadge").style.display = "none";
    }
    if (msg.type === "pong") {
      pingMs = Date.now() - pingStart;
      pingLabel.textContent = `${pingMs} ms`;
    }
  }

  // ===== Ping =====
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      pingStart = Date.now();
      send({ type: "ping" });
    }
  }, 2000);

  // ===== Mouse / Desktop =====
  canvas.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseMoved = true;
    updateWorldMouse();
  });

  canvas.addEventListener("dblclick", () => send({ type: "split" }));
  let wKeyHoldInterval = null;
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); send({ type: "split" }); }
    if (e.code === "KeyW" && !e.repeat) {
      send({ type: "eject" });
      wKeyHoldInterval = setInterval(() => send({ type: "eject" }), 80);
    }
  });
  window.addEventListener("keyup", (e) => {
    if (e.code === "KeyW") {
      clearInterval(wKeyHoldInterval);
      wKeyHoldInterval = null;
    }
  });

  // ===== Action Buttons =====
  document.getElementById("btnSplit").addEventListener("touchstart", (e) => {
    e.preventDefault(); send({ type: "split" });
  }, { passive: false });

  // Auto-hold eject: fires repeatedly while button is held
  let ejectHoldInterval = null;
  function startEject() {
    send({ type: "eject" });
    if (!ejectHoldInterval) {
      ejectHoldInterval = setInterval(() => send({ type: "eject" }), 80);
    }
  }
  function stopEject() {
    clearInterval(ejectHoldInterval);
    ejectHoldInterval = null;
  }
  const btnEject = document.getElementById("btnEject");
  btnEject.addEventListener("touchstart", (e) => { e.preventDefault(); startEject(); }, { passive: false });
  btnEject.addEventListener("touchend", (e) => { e.preventDefault(); stopEject(); }, { passive: false });
  btnEject.addEventListener("touchcancel", stopEject);
  btnEject.addEventListener("mousedown", startEject);
  btnEject.addEventListener("mouseup", stopEject);
  btnEject.addEventListener("mouseleave", stopEject);

  document.getElementById("btnSplit").addEventListener("click", () => send({ type: "split" }));

  // ===== Joystick =====
  function getJoyBaseRect() {
    const r = joyBase.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  }

  joyBase.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (joyActive) return;
    const t = e.changedTouches[0];
    joyTouchId = t.identifier;
    joyActive = true;
    const { cx, cy } = getJoyBaseRect();
    joyBaseX = cx; joyBaseY = cy;
    updateJoy(t.clientX, t.clientY);
  }, { passive: false });

  window.addEventListener("touchmove", (e) => {
    if (!joyActive) return;
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        e.preventDefault();
        updateJoy(t.clientX, t.clientY);
        break;
      }
    }
  }, { passive: false });

  window.addEventListener("touchend", (e) => {
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyActive = false;
        joyDx = 0; joyDy = 0;
        joyKnob.style.transform = "translate(-50%, -50%)";
        if (playing) send({ type: "stop" });
        break;
      }
    }
  });

  function updateJoy(cx, cy) {
    const dx = cx - joyBaseX;
    const dy = cy - joyBaseY;
    const len = Math.hypot(dx, dy);
    const clamped = Math.min(len, JOY_RADIUS);
    const angle = Math.atan2(dy, dx);
    const kx = Math.cos(angle) * clamped;
    const ky = Math.sin(angle) * clamped;
    joyKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
    joyDx = kx / JOY_RADIUS;
    joyDy = ky / JOY_RADIUS;
  }

  // Touch camera drag (non-joystick)
  let dragTouch = null, dragTouchStart = null, dragCamStart = null;
  canvas.addEventListener("touchstart", (e) => {
    if (!playing) return;
    // Multi-touch: use first free touch for camera if joystick busy
  }, { passive: true });

  // ===== World Mouse Update =====
  let mouseMoved = false;
  function updateWorldMouse() {
    if (joyActive) {
      const myPlayer = gameState.players.find(p => p.id === myId);
      if (myPlayer && myPlayer.blobs.length) {
        const cx = myPlayer.blobs.reduce((s, b) => s + b.x, 0) / myPlayer.blobs.length;
        const cy = myPlayer.blobs.reduce((s, b) => s + b.y, 0) / myPlayer.blobs.length;
        worldMouseX = cx + joyDx * 300;
        worldMouseY = cy + joyDy * 300;
      }
    } else {
      worldMouseX = camX + (mouseX - canvas.width / 2) / camZoom;
      worldMouseY = camY + (mouseY - canvas.height / 2) / camZoom;
    }
  }

  // ===== Send Move =====
  let lastSendTime = 0;
  function sendMove() {
    const now = Date.now();
    if (now - lastSendTime < 40) return;
    lastSendTime = now;
    if (!playing) return;
    // Only send move if joystick is active OR mouse has actually moved
    if (!joyActive && !mouseMoved) return;
    updateWorldMouse();
    send({ type: "move", x: worldMouseX, y: worldMouseY });
  }

  // ===== Camera =====
  function updateCamera() {
    const myPlayer = gameState.players.find(p => p.id === myId);
    if (myPlayer && myPlayer.blobs.length) {
      const blobs = myPlayer.blobs;

      // Center camera on weighted center of all blobs
      let sumX = 0, sumY = 0;
      blobs.forEach(b => { sumX += b.x; sumY += b.y; });
      targetCamX = sumX / blobs.length;
      targetCamY = sumY / blobs.length;

      // Bounding box of all blobs
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      blobs.forEach(b => {
        minX = Math.min(minX, b.x - b.r);
        minY = Math.min(minY, b.y - b.r);
        maxX = Math.max(maxX, b.x + b.r);
        maxY = Math.max(maxY, b.y + b.r);
      });

      const spreadW = (maxX - minX) * 2.0;
      const spreadH = (maxY - minY) * 2.0;
      const zoomBySpread = Math.min(canvas.width / spreadW, canvas.height / spreadH);

      // Zoom out more aggressively based on biggest blob
      const maxR = Math.max(...blobs.map(b => b.r));
      const zoomBySize = Math.min(1.2, 120 / (maxR + 40));

      targetZoom = Math.min(zoomBySpread, zoomBySize);
      targetZoom = Math.max(0.04, Math.min(1.2, targetZoom));
    }
    camX += (targetCamX - camX) * 0.1;
    camY += (targetCamY - camY) * 0.1;
    camZoom += (targetZoom - camZoom) * 0.07;
  }

  // ===== HUD =====
  function updateHUD() {
    const myPlayer = gameState.players.find(p => p.id === myId);
    if (myPlayer) {
      scoreLabel.textContent = myPlayer.score.toLocaleString();
    }
    // Leaderboard
    lbEntries.innerHTML = "";
    gameState.leaderboard.forEach((entry, i) => {
      const div = document.createElement("div");
      div.className = "lb-entry" + (entry.name === (myPlayer?.name) ? " lb-me" : "");
      div.innerHTML = `
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-dot" style="background:${entry.color};color:${entry.color}"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(entry.name)}</span>
        <span style="opacity:0.7;font-size:0.65rem">${entry.score}</span>
      `;
      lbEntries.appendChild(div);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ===== GRID RENDER =====
  function drawGrid() {
    const gridSize = 80;
    ctx.strokeStyle = "rgba(0,255,231,0.045)";
    ctx.lineWidth = 1;
    const startX = Math.floor((camX - canvas.width/camZoom/2) / gridSize) * gridSize;
    const startY = Math.floor((camY - canvas.height/camZoom/2) / gridSize) * gridSize;
    const endX = camX + canvas.width/camZoom/2 + gridSize;
    const endY = camY + canvas.height/camZoom/2 + gridSize;
    for (let gx = startX; gx < endX; gx += gridSize) {
      ctx.beginPath();
      ctx.moveTo((gx - camX) * camZoom + canvas.width/2, 0);
      ctx.lineTo((gx - camX) * camZoom + canvas.width/2, canvas.height);
      ctx.stroke();
    }
    for (let gy = startY; gy < endY; gy += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, (gy - camY) * camZoom + canvas.height/2);
      ctx.lineTo(canvas.width, (gy - camY) * camZoom + canvas.height/2);
      ctx.stroke();
    }
  }

  // ===== WORLD BOUNDS =====
  function drawBounds() {
    const x1 = (0 - camX) * camZoom + canvas.width/2;
    const y1 = (0 - camY) * camZoom + canvas.height/2;
    const x2 = (mapWidth - camX) * camZoom + canvas.width/2;
    const y2 = (mapHeight - camY) * camZoom + canvas.height/2;
    ctx.strokeStyle = "rgba(0,255,231,0.4)";
    ctx.lineWidth = 3;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    // Glow
    ctx.shadowColor = "#00ffe7";
    ctx.shadowBlur = 12;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    ctx.shadowBlur = 0;
  }

  // ===== DRAW FOOD =====
  function drawFood() {
    gameState.food.forEach(f => {
      const sx = (f.x - camX) * camZoom + canvas.width/2;
      const sy = (f.y - camY) * camZoom + canvas.height/2;
      const sr = f.r * camZoom;
      if (sx + sr < 0 || sx - sr > canvas.width || sy + sr < 0 || sy - sr > canvas.height) return;
      ctx.beginPath();
      ctx.arc(sx, sy, Math.max(1.5, sr), 0, Math.PI*2);
      ctx.fillStyle = f.color;
      ctx.fill();
    });
  }

  // ===== DRAW VIRUSES =====
  function drawViruses() {
    gameState.viruses.forEach(v => {
      const sx = (v.x - camX) * camZoom + canvas.width/2;
      const sy = (v.y - camY) * camZoom + canvas.height/2;
      const sr = v.r * camZoom;
      if (sx + sr < 0 || sx - sr > canvas.width || sy + sr < 0 || sy - sr > canvas.height) return;
      // Spiky virus
      const spikes = 12;
      ctx.beginPath();
      for (let i = 0; i <= spikes * 2; i++) {
        const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI/2;
        const r = i % 2 === 0 ? sr : sr * 0.72;
        const px = sx + Math.cos(angle) * r;
        const py = sy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(0,220,80,0.25)";
      ctx.fill();
      ctx.strokeStyle = "#00dc50";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#00dc50";
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });
  }

  // ===== DRAW BLOB =====
  function drawBlob(b, color, name, isMe, totalBlobs) {
    const sx = (b.x - camX) * camZoom + canvas.width/2;
    const sy = (b.y - camY) * camZoom + canvas.height/2;
    const sr = b.r * camZoom;
    if (sx + sr < -50 || sx - sr > canvas.width+50 || sy + sr < -50 || sy - sr > canvas.height+50) return;

    // Glow for self
    if (isMe) {
      ctx.shadowColor = color;
      ctx.shadowBlur = sr * 0.45;
    }

    // Blob body
    const grad = ctx.createRadialGradient(sx - sr*0.3, sy - sr*0.3, 0, sx, sy, sr);
    grad.addColorStop(0, lightenColor(color, 40));
    grad.addColorStop(0.6, color);
    grad.addColorStop(1, darkenColor(color, 30));
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Border
    ctx.strokeStyle = isMe ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.18)";
    ctx.lineWidth = isMe ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Name + score (only on largest blob or single)
    if (sr > 18 && (totalBlobs === 1 || b === null)) {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const fontSize = Math.max(10, Math.min(sr * 0.38, 22));
      ctx.font = `700 ${fontSize}px 'Exo 2', sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.shadowBlur = 4;
      ctx.fillText(name, sx, sy);
      ctx.shadowBlur = 0;
    }
  }

  // ===== DRAW PLAYERS =====
  function drawPlayers() {
    // Sort: draw enemies first, then self on top
    const myPlayer = gameState.players.find(p => p.id === myId);
    const others = gameState.players.filter(p => p.id !== myId);
    [...others, ...(myPlayer ? [myPlayer] : [])].forEach(p => {
      p.blobs.forEach((b, bi) => {
        drawBlob(b, p.color, bi === 0 ? p.name : "", p.id === myId, p.blobs.length);
      });
    });
  }

  // ===== COLOR HELPERS =====
  function lightenColor(hsl, amt) {
    return hsl.replace(/hsl\((\d+),(\d+)%,(\d+)%\)/, (_, h, s, l) =>
      `hsl(${h},${s}%,${Math.min(100, parseInt(l)+amt)}%)`);
  }
  function darkenColor(hsl, amt) {
    return hsl.replace(/hsl\((\d+),(\d+)%,(\d+)%\)/, (_, h, s, l) =>
      `hsl(${h},${s}%,${Math.max(0, parseInt(l)-amt)}%)`);
  }

  // ===== BACKGROUND =====
  function drawBackground() {
    ctx.fillStyle = "#04070f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ===== MAIN LOOP =====
  let lastFrame = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = ts - lastFrame;
    lastFrame = ts;

    if (!playing) return;

    sendMove();
    updateCamera();

    drawBackground();
    drawGrid();
    drawBounds();
    drawFood();
    drawViruses();
    drawPlayers();
  }

  requestAnimationFrame(loop);

  // ===== CHAT =====
  const chatPanel = document.getElementById("chatPanel");
  const chatToggleBtn = document.getElementById("chatToggleBtn");
  const chatCloseBtn = document.getElementById("chatCloseBtn");
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const chatSendBtn = document.getElementById("chatSendBtn");
  const chatUnread = document.getElementById("chatUnread");
  const chatTabs = document.querySelectorAll(".chat-tab");

  let chatOpen = false;
  let activeTab = "all";
  let unreadCount = 0;
  const allMessages = []; // { tab, sender, color, text, ts }

  function openChat() {
    chatOpen = true;
    chatPanel.style.display = "flex";
    requestAnimationFrame(() => chatPanel.classList.add("open"));
    unreadCount = 0;
    chatUnread.style.display = "none";
    chatUnread.textContent = "";
    renderMessages();
    setTimeout(() => chatInput.focus(), 300);
  }

  function closeChat() {
    chatOpen = false;
    chatPanel.classList.remove("open");
    setTimeout(() => { chatPanel.style.display = "none"; }, 280);
  }

  chatToggleBtn.addEventListener("click", () => chatOpen ? closeChat() : openChat());
  chatCloseBtn.addEventListener("click", closeChat);

  chatTabs.forEach(tab => {
    tab.addEventListener("click", () => {
      activeTab = tab.dataset.tab;
      chatTabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      renderMessages();
    });
  });

  function formatTime(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
  }

  function renderMessages() {
    const filtered = activeTab === "all"
      ? allMessages
      : allMessages.filter(m => m.tab === activeTab || m.tab === "all");
    chatMessages.innerHTML = "";
    filtered.slice(-80).forEach(m => {
      const div = document.createElement("div");
      div.className = "chat-msg" + (m.sender === "SERVER" ? " server" : "");
      div.innerHTML = `
        <span class="chat-msg-sender" style="color:${m.color}">${escHtml(m.sender)}:</span>
        <span class="chat-msg-text">${escHtml(m.text)}</span>
        <span class="chat-msg-time">${formatTime(m.ts)}</span>
      `;
      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addChatMessage(msg) {
    allMessages.push(msg);
    if (allMessages.length > 200) allMessages.shift();
    if (chatOpen) {
      renderMessages();
    } else {
      unreadCount++;
      chatUnread.textContent = unreadCount > 9 ? "9+" : unreadCount;
      chatUnread.style.display = "flex";
    }
  }

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    send({ type: "chat", text });
    chatInput.value = "";
    chatInput.blur();
  }

  chatSendBtn.addEventListener("click", sendChat);
  chatSendBtn.addEventListener("touchstart", (e) => { e.preventDefault(); sendChat(); }, { passive: false });
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); sendChat(); }
  });

  // Show chat button when playing
  const origJoinGame = joinGame;
  function showChatUI() {
    chatToggleBtn.style.display = "flex";
  }

  // Extend messageHandler to include chat
  messageHandler = function(msg) {
    onMessage(msg);
    if (msg.type === "chat") {
      addChatMessage(msg);
    }
    if (msg.type === "init") {
      chatToggleBtn.style.display = "flex";
    }
    if (msg.type === "state" && playing) {
      chatToggleBtn.style.display = "flex";
    }
    if (msg.type === "dead") {
      chatToggleBtn.style.display = "none";
      closeChat();
    }
    if (msg.type === "roomList") { /* ignore in chat handler */ }
  };

  // ===== CONNECT =====
  connect();

})();
</script>
</body>
